<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pomodoro</title>

<style>
:root {
    --bg: #0b0f1a;
    --card: rgba(255,255,255,0.04);
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #ef4444;
    font-family: system-ui, sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #111827, #05070f);
    color: var(--text);
}

.timer {
    width: 360px;
    padding: 28px;
    border-radius: 20px;
    background: var(--card);
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    text-align: center;
}

/* CYCLE */
.cycle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 12px;
}

/* MODE */
.status {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 10px;
}

/* TIMER */
.time {
    font-size: 3.5rem;
    font-weight: 600;
    margin: 10px 0 20px;
}

/* BUTTONS */
.buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    border-color: var(--accent);
    color: var(--accent);
}

/* TOTAL */
.total {
    margin-top: 18px;
    font-size: 0.75rem;
    color: var(--muted);
}

/* STOP SCREEN */
.stop {
    display: none;
}

.stop h1 {
    font-size: 3rem;
    color: var(--accent);
    margin: 0;
}

.stop p {
    color: var(--muted);
}
</style>
</head>

<body>

<div class="timer">

    <div class="main">
        <div class="cycle" id="cycle">Cycle 1 / 3</div>
        <div class="status" id="status">TRAVAIL</div>

        <div class="time" id="time">01:00:00</div>

        <div class="buttons">
            <button onclick="toggle()">Pause / Play</button>
            <button onclick="reset()">Reset</button>
        </div>

        <div class="total" id="total">Total : 00:00:00</div>
    </div>

    <div class="stop" id="stop">
        <h1>STOP</h1>
        <p>La journée de travail est finie</p>
    </div>

</div>

<script>
let WORK = 3600;
let SHORT = 300;
let LONG = 1800;

let time = WORK;
let running = false;

let phase = "work";
let cycles = 0;
let workBlock = 0;
let total = 0;

let interval;

function format(s){
    let h = String(Math.floor(s/3600)).padStart(2,'0');
    let m = String(Math.floor((s%3600)/60)).padStart(2,'0');
    let sec = String(s%60).padStart(2,'0');
    return `${h}:${m}:${sec}`;
}

function update(){
    document.getElementById("time").textContent = format(time);
    document.getElementById("total").textContent = "Total : " + format(total);
    document.getElementById("status").textContent =
        phase === "work" ? "TRAVAIL" :
        phase === "short" ? "PAUSE" : "PAUSE LONGUE";

    document.getElementById("cycle").textContent = `Cycle ${cycles+1} / 3`;
}

function next(){
    if(phase === "work"){
        workBlock++;

        if(workBlock % 3 === 0){
            phase = "long";
            time = LONG;
            cycles++;
        } else {
            phase = "short";
            time = SHORT;
        }
    } else {
        phase = "work";
        time = WORK;
    }

    if(cycles === 3){
        end();
        return;
    }

    update();
}

function tick(){
    if(!running) return;

    time--;
    total++;

    if(time <= 0){
        next();
    }

    update();
}

function toggle(){
    running = !running;
    if(running){
        interval = setInterval(tick, 1000);
    } else {
        clearInterval(interval);
    }
}

function reset(){
    if(!confirm("Reset complet du timer ?")) return;

    clearInterval(interval);
    running = false;

    phase = "work";
    time = WORK;
    cycles = 0;
    workBlock = 0;
    total = 0;

    document.getElementById("stop").style.display = "none";
    document.querySelector(".main").style.display = "block";

    update();
}

function end(){
    clearInterval(interval);
    document.querySelector(".main").style.display = "none";
    document.getElementById("stop").style.display = "block";
}

update();
</script>

</body>
</html>
