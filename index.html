<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notion Pomodoro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(25,25,25,1);
    font-family: "Inter", sans-serif;
    color: white;
  }

  /* 🧱 CONTAINER FIXE (IMPORTANT) */
  .container {
    width: 260px;
    height: 220px; /* empêche toute variation */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
  }

  .mode {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7a0000;
    margin-bottom: 10px;
  }

  /* ⛔ TIMER STABLE À 100% */
  .timer {
    font-size: 46px; /* plus petit */
    font-weight: 600;
    width: 180px; /* FIXE */
    text-align: center;

    font-variant-numeric: tabular-nums; /* empêche les décalages */
    letter-spacing: 1px;

    margin-bottom: 6px;
  }

  .subtext {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 10px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 12px;
  }

  .line {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.12);
  }

  .buttons {
    display: flex;
    gap: 8px;
  }

  button {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 0px;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }

  .start {
    background: #6b0000;
    color: white;
  }

  .pause {
    background: #1a1a1a;
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .reset {
    background: transparent;
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.15);
  }

  button:hover {
    transform: translateY(-1px);
  }
</style>
</head>

<body>

<div class="container">
  <div class="mode">Travail</div>

  <div class="timer" id="timer">60:00:00</div>

  <div class="subtext">Reste concentré</div>

  <div class="divider">
    <div class="line"></div>
    ✦
    <div class="line"></div>
  </div>

  <div class="buttons">
    <button class="start" onclick="startTimer()">Start</button>
    <button class="pause" onclick="pauseTimer()">Pause</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
  </div>
</div>

<script>
  const WORK_TIME = 60 * 60;   // 1h
  const BREAK_TIME = 5 * 60;  // 5 min

  let mode = "work"; // work | break
  let time = WORK_TIME;
  let interval = null;
  let running = false;

  const timerEl = document.getElementById("timer");
  const modeEl = document.querySelector(".mode");

  function updateDisplay() {
    let hours = Math.floor(time / 3600);
    let minutes = Math.floor((time % 3600) / 60);
    let seconds = time % 60;

    timerEl.textContent =
      String(hours).padStart(2, "0") + ":" +
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0");
  }

  function switchMode() {
    if (mode === "work") {
      mode = "break";
      time = BREAK_TIME;
      modeEl.textContent = "Pause";
      modeEl.style.color = "#4a7a7a";
    } else {
      mode = "work";
      time = WORK_TIME;
      modeEl.textContent = "Travail";
      modeEl.style.color = "#7a0000";
    }
    updateDisplay();
  }

  function startTimer() {
    if (running) return;
    running = true;

    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        running = false;
        switchMode();
        startTimer(); // démarre automatiquement le suivant
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    running = false;
  }

  function resetTimer() {
    pauseTimer();
    mode = "work";
    time = WORK_TIME;
    modeEl.textContent = "Travail";
    modeEl.style.color = "#7a0000";
    updateDisplay();
  }

  updateDisplay();
</script>

</body>
</html>
