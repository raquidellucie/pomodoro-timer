<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pomodoro Timer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Inter", sans-serif;
    color: white;
    background: #0b0c10;
  }

  .container {
    text-align: center;
    padding: 40px 50px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .mode {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #8b0000;
    margin-bottom: 15px;
  }

  /* 🔥 FIX STABILITÉ TIMER */
  .timer {
    font-size: 70px; /* réduit */
    font-weight: 600;
    letter-spacing: 2px;

    width: 260px;          /* largeur fixe */
    margin: 0 auto 10px auto;
    text-align: center;

    font-variant-numeric: tabular-nums; /* clé anti-saut */
  }

  .subtext {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
  }

  .divider {
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: rgba(255,255,255,0.35);
    font-size: 14px;
  }

  .line {
    width: 60px;
    height: 1px;
    background: rgba(255,255,255,0.15);
  }

  .buttons {
    margin-top: 25px;
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  button {
    padding: 10px 18px;
    border-radius: 0px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
    transition: 0.2s;
  }

  .start {
    background: #6b0000;
    color: white;
  }

  .pause {
    background: #1a1a1a;
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .reset {
    background: transparent;
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.15);
  }

  button:hover {
    transform: translateY(-2px);
  }

  button:active {
    transform: translateY(0px);
  }
</style>
</head>

<body>

<div class="container">
  <div class="mode">Travail</div>

  <div class="timer" id="timer">60:00:00</div>

  <div class="subtext">Reste concentré.</div>

  <div class="divider">
    <div class="line"></div>
    ✦
    <div class="line"></div>
  </div>

  <div class="buttons">
    <button class="start" onclick="startTimer()">Start</button>
    <button class="pause" onclick="pauseTimer()">Pause</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
  </div>
</div>

<script>
  let time = 60 * 60;
  let initialTime = time;
  let interval = null;
  let running = false;

  function updateDisplay() {
    let hours = Math.floor(time / 3600);
    let minutes = Math.floor((time % 3600) / 60);
    let seconds = time % 60;

    document.getElementById("timer").textContent =
      String(hours).padStart(2, "0") + ":" +
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0");
  }

  function startTimer() {
    if (running) return;
    running = true;

    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        running = false;
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    running = false;
  }

  function resetTimer() {
    pauseTimer();
    time = initialTime;
    updateDisplay();
  }

  updateDisplay();
</script>

</body>
</html>
