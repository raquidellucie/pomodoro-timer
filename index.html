<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notion Pomodoro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* 🚫 FOND TRANSPARENT TOTAL */
  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
    font-family: "Inter", sans-serif;
    color: white;
  }

  /* 🧱 WIDGET FIXE */
  .container {
    width: 260px;
    height: 220px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    background: rgba(20, 20, 20, 0.35); /* léger glass (optionnel) */
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    backdrop-filter: blur(10px);
  }

  .mode {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7a0000;
    margin-bottom: 10px;
  }

  .timer {
    font-size: 46px;
    font-weight: 600;
    width: 180px;
    text-align: center;

    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;

    margin-bottom: 6px;
  }

  .subtext {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 10px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 12px;
  }

  .line {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.12);
  }

  .buttons {
    display: flex;
    gap: 8px;
  }

  button {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 0px;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }

  .start {
    background: #6b0000;
    color: white;
  }

  .pause {
    background: #1a1a1a;
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .reset {
    background: transparent;
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.15);
  }

  button:hover {
    transform: translateY(-1px);
  }
</style>
</head>

<body>

<div class="container">
  <div class="mode">Travail</div>

  <div class="timer" id="timer">60:00:00</div>

  <div class="subtext">Reste concentré</div>

  <div class="divider">
    <div class="line"></div>
    ✦
    <div class="line"></div>
  </div>

  <div class="buttons">
    <button class="start" onclick="startTimer()">Start</button>
    <button class="pause" onclick="pauseTimer()">Pause</button>
    <button class="reset" onclick="resetTimer()">Reset</button>
  </div>
</div>

<script>
  let time = 60 * 60;
  let initialTime = time;
  let interval = null;
  let running = false;

  function updateDisplay() {
    let hours = Math.floor(time / 3600);
    let minutes = Math.floor((time % 3600) / 60);
    let seconds = time % 60;

    document.getElementById("timer").textContent =
      String(hours).padStart(2, "0") + ":" +
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0");
  }

  function startTimer() {
    if (running) return;
    running = true;

    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        running = false;
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    running = false;
  }

  function resetTimer() {
    pauseTimer();
    time = initialTime;
    updateDisplay();
  }

  updateDisplay();
</script>

</body>
</html>
