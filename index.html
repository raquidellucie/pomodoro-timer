<script>
  const WORK_TIME = 60 * 60;   // 1h
  const BREAK_TIME = 5 * 60;  // 5 min

  let mode = "work"; // work | break
  let time = WORK_TIME;
  let interval = null;
  let running = false;

  const timerEl = document.getElementById("timer");
  const modeEl = document.querySelector(".mode");

  function updateDisplay() {
    let hours = Math.floor(time / 3600);
    let minutes = Math.floor((time % 3600) / 60);
    let seconds = time % 60;

    timerEl.textContent =
      String(hours).padStart(2, "0") + ":" +
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0");
  }

  function switchMode() {
    if (mode === "work") {
      mode = "break";
      time = BREAK_TIME;
      modeEl.textContent = "Pause";
      modeEl.style.color = "#4a7a7a";
    } else {
      mode = "work";
      time = WORK_TIME;
      modeEl.textContent = "Travail";
      modeEl.style.color = "#7a0000";
    }
    updateDisplay();
  }

  function startTimer() {
    if (running) return;
    running = true;

    interval = setInterval(() => {
      if (time > 0) {
        time--;
        updateDisplay();
      } else {
        clearInterval(interval);
        running = false;
        switchMode();
        startTimer(); // démarre automatiquement le suivant
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(interval);
    running = false;
  }

  function resetTimer() {
    pauseTimer();
    mode = "work";
    time = WORK_TIME;
    modeEl.textContent = "Travail";
    modeEl.style.color = "#7a0000";
    updateDisplay();
  }

  updateDisplay();
</script>
