<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pomodoro 3h</title>
<style>
    :root {
        --bg: #0f172a;
        --card: #020617;
        --accent: #38bdf8;
        --work: #22c55e;
        --break: #facc15;
        --text: #e5e7eb;
        --muted: #94a3b8;
        font-family: "Inter", system-ui, sans-serif;
    }

    body {
        background: radial-gradient(circle at top, #020617, #000);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: var(--text);
    }

    .timer-card {
        background: linear-gradient(180deg, #020617, #020617cc);
        border-radius: 24px;
        padding: 32px 36px;
        width: 380px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        position: relative;
    }

    .status {
        text-align: center;
        font-size: 0.9rem;
        letter-spacing: 0.15em;
        color: var(--muted);
        margin-bottom: 12px;
    }

    .time {
        font-size: 4rem;
        text-align: center;
        font-weight: 700;
        letter-spacing: 0.05em;
        margin: 10px 0;
    }

    .cycle {
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 20px;
    }

    .controls {
        display: flex;
        justify-content: center;
        gap: 14px;
    }

    button {
        background: none;
        border: 1px solid #1e293b;
        color: var(--text);
        padding: 10px 18px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: 0.2s;
    }

    button:hover {
        border-color: var(--accent);
        color: var(--accent);
    }

    .total-time {
        position: absolute;
        bottom: 14px;
        right: 18px;
        font-size: 0.75rem;
        color: var(--muted);
    }

    .stop-screen {
        display: none;
        text-align: center;
    }

    .stop-screen h1 {
        font-size: 4rem;
        margin: 0;
        color: var(--accent);
    }

    .stop-screen p {
        color: var(--muted);
        margin-top: 8px;
    }
</style>
</head>
<body>

<div class="timer-card">
    <div class="main">
        <div class="status" id="status">TRAVAIL</div>
        <div class="time" id="time">01:00:00</div>
        <div class="cycle" id="cycle">Cycle 1 / 3</div>

        <div class="controls">
            <button onclick="toggleTimer()">Pause / Reprendre</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <div class="stop-screen" id="stop">
        <h1>STOP</h1>
        <p>La journée de travail est finie</p>
    </div>

    <div class="total-time" id="total">Total : 00:00:00</div>
</div>

<script>
let WORK = 3600;
let SHORT_BREAK = 300;
let LONG_BREAK = 1800;

let timeLeft = WORK;
let running = false;
let phase = "work";
let workHoursDone = 0;
let cyclesDone = 0;
let totalSeconds = 0;
let timer;

function format(t) {
    let h = String(Math.floor(t / 3600)).padStart(2, '0');
    let m = String(Math.floor((t % 3600) / 60)).padStart(2, '0');
    let s = String(t % 60).padStart(2, '0');
    return `${h}:${m}:${s}`;
}

function updateUI() {
    document.getElementById("time").textContent = format(timeLeft);
    document.getElementById("total").textContent = "Total : " + format(totalSeconds);
    document.getElementById("status").textContent =
        phase === "work" ? "TRAVAIL" :
        phase === "short" ? "PAUSE" :
        "PAUSE LONGUE";
}

function nextPhase() {
    if (phase === "work") {
        workHoursDone++;
        if (workHoursDone % 3 === 0) {
            phase = "long";
            timeLeft = LONG_BREAK;
            cyclesDone++;
        } else {
            phase = "short";
            timeLeft = SHORT_BREAK;
        }
    } else {
        phase = "work";
        timeLeft = WORK;
    }

    if (cyclesDone === 3) {
        endDay();
        return;
    }

    document.getElementById("cycle").textContent = `Cycle ${cyclesDone + 1} / 3`;
    updateUI();
}

function tick() {
    if (!running) return;
    timeLeft--;
    totalSeconds++;
    updateUI();

    if (timeLeft <= 0) {
        nextPhase();
    }
}

function toggleTimer() {
    running = !running;
    if (running) {
        timer = setInterval(tick, 1000);
    } else {
        clearInterval(timer);
    }
}

function resetTimer() {
    if (!confirm("Remettre le timer à zéro ?")) return;
    clearInterval(timer);
    running = false;
    phase = "work";
    timeLeft = WORK;
    workHoursDone = 0;
    cyclesDone = 0;
    totalSeconds = 0;
    document.getElementById("stop").style.display = "none";
    document.querySelector(".main").style.display = "block";
    document.getElementById("cycle").textContent = "Cycle 1 / 3";
    updateUI();
}

function endDay() {
    clearInterval(timer);
    document.querySelector(".main").style.display = "none";
    document.getElementById("stop").style.display = "block";
}

updateUI();
</script>

</body>
</html>
